apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: buddy-docuseal
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containers:
      - image: us-central1-docker.pkg.dev/buddy-the-underwriter/buddy-workers/docuseal:3.1.3
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: docuseal-database-url
              key: latest
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: docuseal-secret-key-base
              key: latest
        - name: HOST
          value: docuseal.buddytheunderwriter.com
        resources:
          limits:
            memory: 1Gi
            cpu: '1'
